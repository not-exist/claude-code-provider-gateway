name: Quality Gate

on:
  pull_request:
    paths:
      - "packages/daemon/**"
      - "packages/panel/**"
      - "packages/desktop/**"
      - "docs/**"
      - "package.json"
      - "package-lock.json"
      - "tsconfig.json"
      - ".github/workflows/quality.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  typescript:
    name: TypeScript build and daemon tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daemon tests
        run: npm test

      - name: Typecheck daemon and panel
        run: npm run typecheck

      - name: Build panel and daemon
        run: npm run build

  rust:
    name: Desktop Rust checks
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: packages/desktop/src-tauri

      - name: Install Tauri Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libsoup-3.0-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf

      - name: Create build stubs for Tauri macros
        run: |
          mkdir -p packages/desktop/src-tauri/binaries
          touch packages/desktop/src-tauri/binaries/claude-code-provider-gateway-daemon-x86_64-unknown-linux-gnu
          chmod +x packages/desktop/src-tauri/binaries/claude-code-provider-gateway-daemon-x86_64-unknown-linux-gnu
          mkdir -p packages/daemon/dist/static

      - name: Check formatting
        working-directory: packages/desktop/src-tauri
        run: cargo fmt --check

      - name: Check Rust crate
        working-directory: packages/desktop/src-tauri
        run: cargo check

      - name: Run Rust tests
        working-directory: packages/desktop/src-tauri
        run: cargo test

      - name: Run clippy
        working-directory: packages/desktop/src-tauri
        run: cargo clippy --all-targets -- -D warnings
